---
- name: Setup NodeJS and Common
  include_role:
    name: nodejs

- name: Download User Code
  get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip
    dest: /tmp/user.zip

- name: Unzip User Code
  unarchive:
    src: /tmp/user.zip
    dest: /app
    remote_src: yes

- name: Install Dependencies
  npm:
    path: /app

- name: Copy User Service
  template:
    src: user.service.j2
    dest: /etc/systemd/system/user.service

- name: Reload Daemon
  systemd:
    daemon_reload: yes

- name: Start and Enable User
  service:
    name: user
    state: started
    enabled: yes

- name: Restart User
  service:
    name: user
    state: restarted