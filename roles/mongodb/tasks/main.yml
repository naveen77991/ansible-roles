---
- name: Copy MongoDB Repo
  copy:
    src: mongo.repo
    dest: /etc/yum.repos.d/mongo.repo

- name: Install MongoDB
  dnf:
    name: mongodb-org
    state: present

- name: Start and Enable MongoDB
  service:
    name: mongod
    state: started
    enabled: yes

- name: Allow Remote Connections
  replace:
    path: /etc/mongod.conf
    regexp: '127.0.0.1'
    replace: '0.0.0.0'

- name: Restart MongoDB
  service:
    name: mongod
    state: restarted